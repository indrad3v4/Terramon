name: Serge PR Review
on:
  issue_comment:
    types: [created]
jobs:
  review:
    if: contains(github.event.comment.body, '@askserge please review')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: huggingface/serge@main
        with:
          rules_file: .ai/review-rules.md
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
